# Common config for the db-merge test databases. Anchor lives at the top
# so the 5 services below stay one-line-different from each other.
x-postgres-base: &postgres-base
  image: postgres:16-alpine
  environment:
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
    POSTGRES_DB: soroban_block_explorer
  healthcheck:
    test: ['CMD-SHELL', 'pg_isready -U postgres']
    interval: 5s
    timeout: 3s
    retries: 5

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: soroban_block_explorer
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 3s
      retries: 5

  # db-merge test infrastructure (task 0186 §Step 1, ADR 0040).
  # Gated behind the `db-merge` profile so they don't start on
  # `docker compose up` — opt in via `--profile db-merge` or
  # `COMPOSE_PROFILES=db-merge`.
  #
  # FDW from postgres-merge reaches postgres-snapshot-source by service
  # name on the default compose network (port 5432, internal). The host
  # ports below are only for the db-merge CLI / pg_restore.

  postgres-truth:
    <<: *postgres-base
    ports: ['5433:5432']
    volumes: [pgdata-truth:/var/lib/postgresql/data]
    profiles: [db-merge]

  postgres-laptop-a:
    <<: *postgres-base
    ports: ['5434:5432']
    volumes: [pgdata-laptop-a:/var/lib/postgresql/data]
    profiles: [db-merge]

  postgres-laptop-b:
    <<: *postgres-base
    ports: ['5435:5432']
    volumes: [pgdata-laptop-b:/var/lib/postgresql/data]
    profiles: [db-merge]

  postgres-merge:
    <<: *postgres-base
    ports: ['5436:5432']
    volumes: [pgdata-merge:/var/lib/postgresql/data]
    profiles: [db-merge]

  postgres-snapshot-source:
    <<: *postgres-base
    ports: ['5437:5432']
    volumes: [pgdata-snapshot-source:/var/lib/postgresql/data]
    profiles: [db-merge]

volumes:
  pgdata:
  pgdata-truth:
  pgdata-laptop-a:
  pgdata-laptop-b:
  pgdata-merge:
  pgdata-snapshot-source:
